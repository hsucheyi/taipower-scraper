name: Taipower Loadareas Daily

on:
  schedule:
    - cron: "55 15 * * *" # 台灣時間 23:55
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: |
          python taipower_loadareas_daily.py --output-dir output --excel-name taipower_loadareas.xlsx --sheet-name loadareas

      - name: Commit Excel
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add output/taipower_loadareas.xlsx
          git commit -m "update loadareas excel" || echo "no changes"
          git push
