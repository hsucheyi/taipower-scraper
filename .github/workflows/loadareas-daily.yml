name: Taipower Loadareas Daily

on:
  schedule:
    - cron: "40 15 * * *"  # UTC 15:40 = 台灣 23:40，提早啟動，腳本內等到 23:51 才抓
  workflow_dispatch:  # 手動補跑用，自動跳過等待

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python scripts/taipower_loadareas_daily.py --output-dir output --no-wait
          else
            python scripts/taipower_loadareas_daily.py --output-dir output
          fi

      - name: Commit outputs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add output/*.csv output/*.xlsx
          git commit -m "update loadareas data" || echo "no changes"
          git push
